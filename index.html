<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get My Coordinates</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    margin:0;
    padding:25px;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:100%;
    max-width:500px;
    background:#fff;
    padding:30px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    text-align:center;
}

.main-btn{
    width:100%;
    padding:22px;
    font-size:28px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
}

.main-btn:hover{
    background:#0b5ed7;
}

.copy-btn{
    width:100%;
    margin-top:20px;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    background:#198754;
    color:white;
    cursor:pointer;
}

.copy-btn:disabled{
    background:#bdbdbd;
    cursor:not-allowed;
}

#result{
    margin-top:35px;
    font-size:28px;
    font-weight:bold;
    line-height:1.8;
    word-break:break-word;
}

.loading{
    color:#ff9800;
}

.success{
    color:#198754;
}

.error{
    color:red;
}
</style>

</head>
<body>

<div class="container">

    <button class="main-btn" onclick="getLocation()">
        📍 Get My Coordinates
    </button>

    <div id="result"></div>

    <button id="copyBtn"
            class="copy-btn"
            onclick="copyCoordinates()"
            disabled>
        📋 Copy Coordinates
    </button>

</div>

<script>

let coordinates = "";

function getLocation(){

    const result = document.getElementById("result");
    const copyBtn = document.getElementById("copyBtn");

    copyBtn.disabled = true;

    if(!navigator.geolocation){
        result.className="error";
        result.innerHTML="Geolocation is not supported by your browser.";
        return;
    }

    result.className="loading";
    result.innerHTML="Getting your location...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            coordinates = `${latitude},${longitude}`;

            result.className="success";

            result.innerHTML=`
                <div>Coordinates</div>
                <div>${coordinates}</div>
            `;

            copyBtn.disabled = false;

        },

        function(error){

            result.className="error";
            result.innerHTML=error.message;

        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );

}

async function copyCoordinates(){

    if(!coordinates)
        return;

    try{

        await navigator.clipboard.writeText(coordinates);

        const btn=document.getElementById("copyBtn");
        btn.innerHTML="✅ Copied!";

        setTimeout(()=>{
            btn.innerHTML="📋 Copy Coordinates";
        },2000);

    }
    catch{

        // Fallback para sa ibang browser
        const text=document.createElement("textarea");
        text.value=coordinates;
        document.body.appendChild(text);
        text.select();
        document.execCommand("copy");
        document.body.removeChild(text);

        const btn=document.getElementById("copyBtn");
        btn.innerHTML="✅ Copied!";

        setTimeout(()=>{
            btn.innerHTML="📋 Copy Coordinates";
        },2000);
    }

}

</script>

</body>
</html>
