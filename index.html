<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get My Coordinates</title>

<style>
    *{
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        margin:0;
        padding:25px;
        background:#f5f5f5;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        width:100%;
        max-width:500px;
        background:#fff;
        padding:30px;
        border-radius:18px;
        box-shadow:0 8px 25px rgba(0,0,0,.15);
        text-align:center;
    }

    h1{
        font-size:34px;
        margin-bottom:30px;
    }

    button{
        width:100%;
        padding:22px;
        font-size:28px;
        font-weight:bold;
        border:none;
        border-radius:15px;
        background:#0d6efd;
        color:white;
        cursor:pointer;
        transition:.2s;
    }

    button:active{
        transform:scale(.98);
    }

    button:hover{
        background:#0b5ed7;
    }

    #result{
        margin-top:35px;
        font-size:28px;
        font-weight:bold;
        line-height:1.8;
        word-break:break-word;
    }

    .loading{
        color:#ff9800;
    }

    .success{
        color:#198754;
    }

    .error{
        color:red;
    }
</style>

</head>
<body>

<div class="container">

    <h1></h1>

    <button onclick="getLocation()">
        Get My Coordinates
    </button>

    <div id="result"></div>

</div>

<script>

function getLocation() {

    const result = document.getElementById("result");

    if (!navigator.geolocation) {
        result.className = "error";
        result.innerHTML = "Geolocation is not supported by your browser.";
        return;
    }

    result.className = "loading";
    result.innerHTML = "Getting your location...";

    navigator.geolocation.getCurrentPosition(

        function(position){

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            result.className = "success";

            result.innerHTML = `
                <div>Coordinates</div>
                <div>${latitude},${longitude}</div>
            `;

            console.log(latitude, longitude);

        },

        function(error){

            result.className = "error";
            result.innerHTML = error.message;

        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }

    );

}

</script>

</body>
</html>
